<!DOCTYPE html>
<html>
<head>
  <title>ProjectHub</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      margin:0;
      font-family: Arial;
      display:flex;
      background:#f5f6fa;
    }

    .sidebar {
      width:220px;
      background:#111827;
      color:white;
      height:100vh;
      padding:20px;
    }

    .nav-item {
      margin:12px 0;
      cursor:pointer;
    }

    .main {
      flex:1;
      padding:20px;
    }

    h2 { margin-top:0; }

    .card {
      background:white;
      padding:15px;
      border-radius:8px;
      margin-bottom:12px;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
    }

    input, select {
      padding:8px;
      margin:5px;
    }

    button {
      padding:8px 12px;
      border:none;
      border-radius:5px;
      background:#4f6ef7;
      color:white;
      cursor:pointer;
    }

    .delete { background:red; }

    .hidden { display:none; }

    .kanban {
      display:flex;
      gap:10px;
    }

    .column {
      flex:1;
      background:#e5e7eb;
      padding:10px;
      border-radius:6px;
      min-height:200px;
    }

    a { color:#4f6ef7; }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>🚀 ProjectHub</h2>
  <div class="nav-item" onclick="showView('dashboard')">Dashboard</div>
  <div class="nav-item" onclick="showView('projects')">Projects</div>
  <div class="nav-item" onclick="showView('kanban')">Kanban</div>
</div>

<div class="main">

  <!-- DASHBOARD -->
  <div id="dashboard">
    <h2>Dashboard</h2>
    <div id="stats"></div>
  </div>

  <!-- PROJECTS -->
  <div id="projects" class="hidden">
    <h2>Projects</h2>

    <div class="card">
      <input id="name" placeholder="Project Name">
      <input id="dept" placeholder="Department">

      <select id="status">
        <option>Planning</option>
        <option>Active</option>
        <option>Review</option>
        <option>Blocked</option>
        <option>Completed</option>
      </select>

      <select id="priority">
        <option>High</option>
        <option>Medium</option>
        <option>Low</option>
      </select>

      <input id="progress" type="number" placeholder="Progress %">
      <input id="doc" placeholder="Google Sheet / Doc link">

      <button onclick="addProject()">Add Project</button>
    </div>

    <div id="projectList"></div>
  </div>

  <!-- KANBAN -->
  <div id="kanban" class="hidden">
    <h2>Kanban</h2>
    <div class="kanban">
      <div class="column"><h3>Planning</h3><div id="Planning"></div></div>
      <div class="column"><h3>Active</h3><div id="Active"></div></div>
      <div class="column"><h3>Review</h3><div id="Review"></div></div>
      <div class="column"><h3>Blocked</h3><div id="Blocked"></div></div>
      <div class="column"><h3>Completed</h3><div id="Completed"></div></div>
    </div>
  </div>

</div>

<script>
const db = supabase.createClient(
  "https://cdzmhgvhqrrgrjbxsncj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkem1oZ3ZocXJyZ3JqYnhzbmNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1OTAwMjEsImV4cCI6MjA5MDE2NjAyMX0.3d6qERFE0RQw25EyPdaOhga1rF3aREPxBumPWjThewE"
);

let projects = [];

/* NAVIGATION */
function showView(v) {
  ["dashboard","projects","kanban"].forEach(id=>{
    document.getElementById(id).classList.add("hidden");
  });
  document.getElementById(v).classList.remove("hidden");
}

/* LOAD DATA */
async function loadProjects() {
  const { data, error } = await db.from("projects").select("*");

  if (error) {
    console.error(error);
    return;
  }

  projects = data;
  renderAll();
}

/* DASHBOARD */
function renderStats() {
  const total = projects.length;
  const active = projects.filter(p=>p.status==="Active").length;

  document.getElementById("stats").innerHTML = `
    <div class="card">Total Projects: ${total}</div>
    <div class="card">Active Projects: ${active}</div>
  `;
}

/* PROJECT LIST */
function renderProjects() {
  const list = document.getElementById("projectList");
  list.innerHTML = "";

  projects.forEach(p=>{
    list.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        Dept: ${p.dept}<br>

        Status:
        <select onchange="updateStatus(${p.id}, this.value)">
          ${["Planning","Active","Review","Blocked","Completed"]
            .map(s => `<option ${p.status===s?"selected":""}>${s}</option>`)
            .join("")}
        </select><br>

        Priority: ${p.priority}<br>
        Progress: ${p.progress}%<br>

        ${p.doc_link ? `<a href="${p.doc_link}" target="_blank">📎 Open Document</a><br>` : ""}

        <button onclick="editProject(${p.id})">Edit</button>
        <button class="delete" onclick="deleteProject(${p.id})">Delete</button>
      </div>
    `;
  });
}

/* KANBAN */
function renderKanban() {
  ["Planning","Active","Review","Blocked","Completed"].forEach(s=>{
    document.getElementById(s).innerHTML="";
  });

  projects.forEach(p=>{
    document.getElementById(p.status).innerHTML +=
      `<div class="card">${p.name}</div>`;
  });
}

/* ADD */
async function addProject() {
  await db.from("projects").insert([{
    name: name.value,
    dept: dept.value,
    status: status.value,
    priority: priority.value,
    progress: parseInt(progress.value)||0,
    doc_link: doc.value
  }]);

  loadProjects();
}

/* DELETE */
async function deleteProject(id) {
  await db.from("projects").delete().eq("id", id);
  loadProjects();
}

/* STATUS UPDATE */
async function updateStatus(id, status) {
  await db.from("projects").update({ status }).eq("id", id);
  loadProjects();
}

/* EDIT */
async function editProject(id) {
  const newName = prompt("New name:");
  if (!newName) return;

  await db.from("projects").update({ name: newName }).eq("id", id);
  loadProjects();
}

/* RENDER */
function renderAll() {
  renderStats();
  renderProjects();
  renderKanban();
}

loadProjects();
</script>

</body>
</html>
