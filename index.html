<!DOCTYPE html>
<html>
<head>
  <title>ProjectHub Pro+</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body { margin:0; font-family: Arial; display:flex; }

    .sidebar {
      width:220px;
      background:#111827;
      color:white;
      height:100vh;
      padding:20px;
    }

    .nav-item { margin:10px 0; cursor:pointer; }

    .main {
      flex:1;
      padding:20px;
      background:#f5f6fa;
    }

    .card {
      background:white;
      padding:15px;
      border-radius:8px;
      margin-bottom:10px;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
    }

    .hidden { display:none; }

    input, select {
      padding:6px;
      margin:5px;
    }

    button {
      padding:6px 10px;
      border:none;
      background:#4f6ef7;
      color:white;
      border-radius:4px;
      cursor:pointer;
    }

    .delete { background:red; }

    .kanban {
      display:flex;
      gap:10px;
    }

    .column {
      flex:1;
      background:#e5e7eb;
      padding:10px;
      border-radius:6px;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>🚀 ProjectHub</h2>
  <div class="nav-item" onclick="showView('dashboard')">Dashboard</div>
  <div class="nav-item" onclick="showView('projects')">Projects</div>
  <div class="nav-item" onclick="showView('kanban')">Kanban</div>
  <div class="nav-item" onclick="showView('docs')">Documents</div>
</div>

<div class="main">

  <!-- DASHBOARD -->
  <div id="dashboard">
    <h2>Dashboard</h2>
    <div id="stats"></div>
  </div>

  <!-- PROJECTS -->
  <div id="projects" class="hidden">
    <h2>Projects</h2>

    <input id="name" placeholder="Name">
    <input id="dept" placeholder="Department">

    <select id="status">
      <option>Planning</option>
      <option>Active</option>
      <option>Review</option>
      <option>Blocked</option>
      <option>Completed</option>
    </select>

    <select id="priority">
      <option>High</option>
      <option>Medium</option>
      <option>Low</option>
    </select>

    <input id="progress" type="number" placeholder="Progress %">

    <button onclick="addProject()">Add</button>

    <div id="projectList"></div>
  </div>

  <!-- KANBAN -->
  <div id="kanban" class="hidden">
    <h2>Kanban</h2>
    <div class="kanban">
      <div class="column"><h3>Planning</h3><div id="Planning"></div></div>
      <div class="column"><h3>Active</h3><div id="Active"></div></div>
      <div class="column"><h3>Review</h3><div id="Review"></div></div>
      <div class="column"><h3>Blocked</h3><div id="Blocked"></div></div>
      <div class="column"><h3>Completed</h3><div id="Completed"></div></div>
    </div>
  </div>

  <!-- DOCUMENTS -->
  <div id="docs" class="hidden">
    <h2>Documents</h2>

    <input type="file" id="fileInput">
    <button onclick="uploadFile()">Upload</button>

    <div id="fileList"></div>
  </div>

</div>

<script>
const supabaseClient = supabase.createClient(
  "https://cdzmhgvhqrrgrjbxsncj.supabase.co",
  "YOUR_KEY"
);

let projects = [];

/* NAVIGATION */
function showView(v) {
  ["dashboard","projects","kanban","docs"].forEach(id=>{
    document.getElementById(id).classList.add("hidden");
  });
  document.getElementById(v).classList.remove("hidden");

  if(v === "docs") loadFiles();
}

/* LOAD PROJECTS */
async function loadProjects() {
  const { data } = await supabaseClient.from("projects").select("*");
  projects = data;
  renderAll();
}

/* DASHBOARD */
function renderStats() {
  document.getElementById("stats").innerHTML =
    `<div class="card">Total Projects: ${projects.length}</div>`;
}

/* PROJECT LIST */
function renderProjects() {
  const list = document.getElementById("projectList");
  list.innerHTML = "";

  projects.forEach(p=>{
    list.innerHTML += `
      <div class="card">
        <b>${p.name}</b><br>
        ${p.dept}<br>
        ${p.status} | ${p.priority} | ${p.progress}%<br>

        <button onclick="deleteProject(${p.id})">Delete</button>
      </div>
    `;
  });
}

/* KANBAN */
function renderKanban() {
  ["Planning","Active","Review","Blocked","Completed"].forEach(s=>{
    document.getElementById(s).innerHTML="";
  });

  projects.forEach(p=>{
    document.getElementById(p.status).innerHTML +=
      `<div class="card">${p.name}</div>`;
  });
}

/* ADD PROJECT */
async function addProject() {
  await supabaseClient.from("projects").insert([{
    name: name.value,
    dept: dept.value,
    status: status.value,
    priority: priority.value,
    progress: parseInt(progress.value)||0
  }]);

  loadProjects();
}

/* DELETE */
async function deleteProject(id) {
  await supabaseClient.from("projects").delete().eq("id", id);
  loadProjects();
}

/* FILE UPLOAD */
async function uploadFile() {
  const file = document.getElementById("fileInput").files[0];
  if(!file) return;

  const { error } = await supabaseClient.storage
    .from("documents")
    .upload(file.name, file);

  if(error) alert("Upload failed");
  else loadFiles();
}

/* LOAD FILES */
async function loadFiles() {
  const { data } = await supabaseClient.storage
    .from("documents")
    .list();

  const list = document.getElementById("fileList");
  list.innerHTML = "";

  data.forEach(f=>{
    const url = supabaseClient.storage
      .from("documents")
      .getPublicUrl(f.name).data.publicUrl;

    list.innerHTML += `
      <div class="card">
        <a href="${url}" target="_blank">${f.name}</a>
      </div>
    `;
  });
}

/* RENDER ALL */
function renderAll() {
  renderStats();
  renderProjects();
  renderKanban();
}

loadProjects();
</script>

</body>
</html>
