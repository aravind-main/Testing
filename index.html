<!DOCTYPE html>
<html>
<head>
  <title>ProjectHub Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body { margin:0; font-family: Arial; background:#f5f6fa; }

    header {
      background:#4f6ef7;
      color:white;
      padding:15px 25px;
      font-size:20px;
      font-weight:bold;
    }

    .container {
      max-width:1000px;
      margin:auto;
      padding:20px;
    }

    .form {
      background:white;
      padding:15px;
      border-radius:10px;
      margin-bottom:20px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    input, select {
      padding:8px;
    }

    button {
      padding:8px 12px;
      border:none;
      border-radius:6px;
      background:#4f6ef7;
      color:white;
      cursor:pointer;
    }

    .delete { background:red; }

    .card {
      background:white;
      padding:15px;
      border-radius:10px;
      margin-bottom:12px;
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
    }

    .actions {
      margin-top:10px;
      display:flex;
      gap:10px;
    }
  </style>
</head>

<body>

<header>🚀 ProjectHub Pro (Cloud)</header>

<div class="container">

  <!-- FORM -->
  <div class="form">
    <input id="name" placeholder="Project Name">
    
    <select id="status">
      <option>Planning</option>
      <option>Active</option>
      <option>Review</option>
      <option>Blocked</option>
    </select>

    <select id="priority">
      <option>High</option>
      <option>Medium</option>
      <option>Low</option>
    </select>

    <input id="progress" type="number" placeholder="Progress %">

    <button onclick="addProject()">Add</button>
  </div>

  <!-- PROJECTS -->
  <div id="projects"></div>

</div>

<script>
const SUPABASE_URL = "https://cdzmhgvhqrrgrjbxsncj.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkem1oZ3ZocXJyZ3JqYnhzbmNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1OTAwMjEsImV4cCI6MjA5MDE2NjAyMX0.3d6qERFE0RQw25EyPdaOhga1rF3aREPxBumPWjThewE";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let projects = [];

/* LOAD */
async function loadProjects() {
  const { data, error } = await db.from("projects").select("*").order("id");

  if (error) {
    console.error(error);
    return;
  }

  projects = data;
  render();
}

/* RENDER */
function render() {
  const container = document.getElementById("projects");
  container.innerHTML = "";

  projects.forEach(p => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${p.name}</h3>

      <p>Status:
        <select onchange="updateStatus(${p.id}, this.value)">
          <option ${p.status==="Planning"?"selected":""}>Planning</option>
          <option ${p.status==="Active"?"selected":""}>Active</option>
          <option ${p.status==="Review"?"selected":""}>Review</option>
          <option ${p.status==="Blocked"?"selected":""}>Blocked</option>
        </select>
      </p>

      <p>Priority: ${p.priority}</p>
      <p>Progress: ${p.progress}%</p>

      <div class="actions">
        <button onclick="editProject(${p.id})">Edit</button>
        <button class="delete" onclick="deleteProject(${p.id})">Delete</button>
      </div>
    `;

    container.appendChild(div);
  });
}

/* ADD */
async function addProject() {
  const name = document.getElementById("name").value;
  const status = document.getElementById("status").value;
  const priority = document.getElementById("priority").value;
  const progress = parseInt(document.getElementById("progress").value) || 0;

  if (!name) return alert("Enter name");

  const { error } = await db.from("projects").insert([
    { name, status, priority, progress }
  ]);

  if (error) {
    console.error(error);
    alert("Error saving");
    return;
  }

  document.getElementById("name").value = "";
  document.getElementById("progress").value = "";

  loadProjects();
}

/* DELETE */
async function deleteProject(id) {
  await db.from("projects").delete().eq("id", id);
  loadProjects();
}

/* UPDATE STATUS */
async function updateStatus(id, status) {
  await db.from("projects").update({ status }).eq("id", id);
}

/* EDIT */
async function editProject(id) {
  const newName = prompt("Enter new name:");
  if (!newName) return;

  await db.from("projects").update({ name: newName }).eq("id", id);
  loadProjects();
}

loadProjects();
</script>

</body>
</html>
