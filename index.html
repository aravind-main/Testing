<!DOCTYPE html>
<html>
<head>
  <title>ProjectHub Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body { margin:0; font-family:Arial; display:flex; }

    .sidebar {
      width:220px;
      background:#111827;
      color:white;
      height:100vh;
      padding:20px;
    }

    .sidebar h2 { margin-bottom:20px; }

    .nav-item {
      margin:10px 0;
      cursor:pointer;
    }

    .main {
      flex:1;
      padding:20px;
      background:#f5f6fa;
    }

    .card {
      background:white;
      padding:15px;
      border-radius:8px;
      margin-bottom:10px;
    }

    .hidden { display:none; }

    button {
      padding:6px 10px;
      border:none;
      background:#4f6ef7;
      color:white;
      border-radius:4px;
      cursor:pointer;
    }

    .delete { background:red; }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>🚀 ProjectHub</h2>
  <div class="nav-item" onclick="showView('dashboard')">Dashboard</div>
  <div class="nav-item" onclick="showView('projects')">Projects</div>
  <div class="nav-item" onclick="showView('kanban')">Kanban</div>
</div>

<div class="main">

  <!-- DASHBOARD -->
  <div id="dashboard">
    <h2>Dashboard</h2>
    <div id="stats"></div>
  </div>

  <!-- PROJECTS -->
  <div id="projects" class="hidden">
    <h2>Projects</h2>

    <input id="name" placeholder="Project name">
    <button onclick="addProject()">Add</button>

    <div id="projectList"></div>
  </div>

  <!-- KANBAN -->
  <div id="kanban" class="hidden">
    <h2>Kanban</h2>
    <div style="display:flex; gap:10px;">
      <div><h3>Planning</h3><div id="col-planning"></div></div>
      <div><h3>Active</h3><div id="col-active"></div></div>
      <div><h3>Review</h3><div id="col-review"></div></div>
      <div><h3>Blocked</h3><div id="col-blocked"></div></div>
    </div>
  </div>

</div>

<script>
const db = supabase.createClient(
  "https://cdzmhgvhqrrgrjbxsncj.supabase.co",
  "YOUR_KEY"
);

let projects = [];

function showView(v) {
  ["dashboard","projects","kanban"].forEach(id=>{
    document.getElementById(id).classList.add("hidden");
  });
  document.getElementById(v).classList.remove("hidden");
}

/* LOAD */
async function loadProjects() {
  const { data } = await db.from("projects").select("*");
  projects = data;
  renderAll();
}

/* DASHBOARD */
function renderStats() {
  const total = projects.length;
  const active = projects.filter(p=>p.status==="Active").length;

  document.getElementById("stats").innerHTML = `
    <div class="card">Total: ${total}</div>
    <div class="card">Active: ${active}</div>
  `;
}

/* PROJECT LIST */
function renderProjects() {
  const list = document.getElementById("projectList");
  list.innerHTML = "";

  projects.forEach(p=>{
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${p.name}</b><br>
      Status: ${p.status}<br>

      <button onclick="deleteProject(${p.id})">Delete</button>
    `;

    list.appendChild(div);
  });
}

/* KANBAN */
function renderKanban() {
  ["planning","active","review","blocked"].forEach(c=>{
    document.getElementById("col-"+c).innerHTML = "";
  });

  projects.forEach(p=>{
    const col = "col-"+p.status.toLowerCase();

    const div = document.createElement("div");
    div.className = "card";
    div.innerText = p.name;

    document.getElementById(col).appendChild(div);
  });
}

/* ADD */
async function addProject() {
  const name = document.getElementById("name").value;
  if (!name) return;

  await db.from("projects").insert([{ name, status:"Planning" }]);
  loadProjects();
}

/* DELETE */
async function deleteProject(id) {
  await db.from("projects").delete().eq("id", id);
  loadProjects();
}

/* RENDER ALL */
function renderAll() {
  renderStats();
  renderProjects();
  renderKanban();
}

loadProjects();
</script>

</body>
</html>
